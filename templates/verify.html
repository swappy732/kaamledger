<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Worker - KaamLedger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; }

        .navbar {
            background: #2c3e50;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 24px; color: #f39c; }
        .navbar a { color: #ccc; text-decoration: none; font-size: 14px; }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
        }
        .btn {
            padding: 12px 25px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn:hover { background: #e67e22; }
        .btn-green {
            background: #27ae60;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .btn-green:hover { background: #219a52; }

        .profile {
            display: none;
            border: 2px solid #27ae60;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: #3498db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }
        .profile-info h3 { font-size: 22px; color: #2c3e50; }
        .profile-info p { color: #666; font-size: 14px; }
        .badge {
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 5px;
            display: inline-block;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat h4 { font-size: 22px; color: #2c3e50; }
        .stat p { font-size: 12px; color: #888; }

        .jobs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .jobs-table th {
            background: #2c3e50;
            color: white;
            padding: 10px;
            text-align: left;
            font-size: 13px;
        }
        .jobs-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .jobs-table tr:nth-child(even) { background: #f8f9fa; }

        .error {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-top: 15px;
        }
        .back {
            text-align: center;
            margin-top: 20px;
        }
        .back a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🔨 KaamLedger</h1>
    <a href="/">← Back to Home</a>
</nav>

<div class="container">
    <h2>Verify Worker Profile</h2>
    <p class="subtitle">Enter Worker ID to see their verified work history</p>

    <div class="search-box">
        <input type="number" id="workerId" placeholder="Enter Worker ID e.g. 1">
        <button class="btn" onclick="searchWorker()">Search</button>
    </div>

    <div class="error" id="errorBox">
        ❌ Worker not found. Please check the ID and try again.
    </div>

    <div class="profile" id="profileBox">
        <div class="profile-header">
            <div class="avatar">👷</div>
            <div class="profile-info">
                <h3 id="workerName"></h3>
                <p id="workerSkill"></p>
                <p id="workerPhone"></p>
                <span class="badge">✅ KaamLedger Verified</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <h4 id="totalJobs">0</h4>
                <p>Jobs Done</p>
            </div>
            <div class="stat">
                <h4 id="totalEarnings">₹0</h4>
                <p>Total Earned</p>
            </div>
            <div class="stat">
                <h4 id="avgRating">0</h4>
                <p>Avg Rating</p>
            </div>
        </div>

        <h4 style="margin-bottom:10px; color:#2c3e50;">Job History</h4>
        <table class="jobs-table">
            <thead>
                <tr>
                    <th>Job Type</th>
                    <th>Amount</th>
                    <th>Rating</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
        </table>

        <button class="btn-green" onclick="downloadCertificate()">
            📄 Download PDF Certificate
        </button>
    </div>

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
let currentWorkerId = null;

async function searchWorker() {
    const workerId = document.getElementById('workerId').value;
    if (!workerId) { alert('Please enter a Worker ID'); return; }

    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('profileBox').style.display = 'none';

    const workerRes = await fetch(`/worker/${workerId}`);
    if (!workerRes.ok) {
        document.getElementById('errorBox').style.display = 'block';
        return;
    }
    const worker = await workerRes.json();

    const historyRes = await fetch(`/history/${workerId}`);
    const history = await historyRes.json();

    currentWorkerId = workerId;

    document.getElementById('workerName').innerText = worker.name;
    document.getElementById('workerSkill').innerText = '🔧 ' + worker.skill;
    document.getElementById('workerPhone').innerText = '📞 ' + worker.phone;
    document.getElementById('totalJobs').innerText = history.total_jobs;

    const totalEarnings = history.jobs.reduce((sum, j) => sum + j.amount_paid, 0);
    const avgRating = history.total_jobs > 0
        ? (history.jobs.reduce((sum, j) => sum + j.rating, 0) / history.total_jobs).toFixed(1)
        : 0;

    document.getElementById('totalEarnings').innerText = '₹' + totalEarnings;
    document.getElementById('avgRating').innerText = avgRating + '/5';

    const tbody = document.getElementById('jobsBody');
    tbody.innerHTML = '';
    history.jobs.forEach(job => {
        tbody.innerHTML += `
            <tr>
                <td>${job.job_type}</td>
                <td>₹${job.amount_paid}</td>
                <td>${job.rating}/5 ⭐</td>
                <td>${job.confirmed_on.slice(0,10)}</td>
            </tr>`;
    });

    document.getElementById('profileBox').style.display = 'block';
}

function downloadCertificate() {
    if (currentWorkerId) {
        window.open(`/certificate/${currentWorkerId}`, '_blank');
    }
}
</script>

</body>
</html>
